<!DOCTYPE html>

<html>

<head>

  <title>Room Booking System</title>

  <style>

    body {

      font-family: Arial;
      background: #f4f4f4;
      padding: 40px;

    }

    .container {

      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;

    }

    h1 {

      text-align: center;
      color: #333;

    }

    input, select, button {

      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid gray;

    }

    button {

      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;

    }

    button:hover {

      background: #0056b3;

    }

    .status {

      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Room Booking System</h1>

    <form action="/book-room" method="GET">

      <label>Room</label>

      <select name="room" id="room">

        <option value="SeminarHall">
          Seminar Hall
        </option>

        <option value="ConferenceRoom">
          Conference Room
        </option>

        <option value="Lab101">
          Lab 101
        </option>

      </select>

      <label>Select Date</label>

      <input
        type="date"
        name="date"
        id="date"
        required
      >

      <label>Start Time</label>

      <input
        type="time"
        name="start"
        id="start"
        required
      >

      <label>End Time</label>

      <input
        type="time"
        name="end"
        id="end"
        required
      >

      <div class="status" id="status">

      </div>

      <button type="button" onclick="checkAvailability()">
        Check Availability
      </button>

      <button type="submit">
        Book Room
      </button>

    </form>

  </div>

  <script>

    async function checkAvailability() {

      const room =
        document.getElementById("room").value;

      const date =
        document.getElementById("date").value;

      const start =
        document.getElementById("start").value;

      const end =
        document.getElementById("end").value;

      const response = await fetch(

        `/check-availability?room=${room}&date=${date}&start=${start}&end=${end}`

      );

      const result = await response.text();

      const status =
        document.getElementById("status");

      status.innerHTML =
        `Room Status: ${result}`;

      if (result === "Busy") {

        status.style.color = "red";

      } else {

        status.style.color = "green";

      }

    }

  </script>

</body>

</html>
