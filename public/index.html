<!DOCTYPE html>

<html>

<head>

  <title>IIT BHU Room Booking System</title>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- Google Font -->

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Full Calendar CSS -->

  <link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
    rel="stylesheet"
  >

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;

    }

    body {

      font-family: "Poppins", sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e293b
        );

      min-height: 100vh;

      padding: 30px;

    }

    .container {

      max-width: 1200px;

      margin: auto;

      display: grid;

      grid-template-columns: 420px 1fr;

      gap: 30px;

    }

    .booking-box,
    .calendar-box {

      background: white;

      border-radius: 20px;

      padding: 30px;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.2);

    }

    .top {

      text-align: center;

      margin-bottom: 25px;

    }

    .top h1 {

      font-size: 30px;

      color: #0f172a;

      margin-bottom: 10px;

    }

    .top p {

      color: #64748b;

    }

    .google-btn {

      display: block;

      width: 100%;

      text-align: center;

      text-decoration: none;

      background: #16a34a;

      color: white;

      padding: 14px;

      border-radius: 12px;

      font-weight: 600;

      margin-bottom: 25px;

      transition: 0.3s;

    }

    .google-btn:hover {

      background: #15803d;

    }

    .input-group {

      margin-bottom: 18px;

    }

    .input-group label {

      display: block;

      margin-bottom: 8px;

      font-weight: 600;

      color: #334155;

    }

    .input-group input,
    .input-group select {

      width: 100%;

      padding: 14px;

      border-radius: 10px;

      border: 1px solid #cbd5e1;

      outline: none;

      transition: 0.3s;

    }

    .input-group input:focus,
    .input-group select:focus {

      border-color: #2563eb;

      box-shadow:
        0 0 0 4px rgba(37,99,235,0.15);

    }

    .row {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 15px;

    }

    .buttons {

      display: flex;

      gap: 15px;

      margin-top: 20px;

    }

    .buttons button {

      flex: 1;

      padding: 14px;

      border: none;

      border-radius: 10px;

      font-size: 15px;

      font-weight: 600;

      cursor: pointer;

      transition: 0.3s;

    }

    .check-btn {

      background: #f59e0b;

      color: white;

    }

    .check-btn:hover {

      background: #d97706;

    }

    .book-btn {

      background: #2563eb;

      color: white;

    }

    .book-btn:hover {

      background: #1d4ed8;

    }

    .status {

      text-align: center;

      margin-top: 15px;

      font-size: 18px;

      font-weight: 700;

    }

    .footer {

      margin-top: 25px;

      text-align: center;

    }

    .footer a {

      text-decoration: none;

      color: #2563eb;

      font-weight: 600;

    }

    #calendar {

      margin-top: 10px;

    }

    @media(max-width: 950px) {

      .container {

        grid-template-columns: 1fr;

      }

    }

    @media(max-width: 600px) {

      .row {

        grid-template-columns: 1fr;

      }

      .buttons {

        flex-direction: column;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->

    <div class="booking-box">

      <div class="top">

        <h1>
          IIT BHU Room Booking
        </h1>

        <p>
          Smart Scheduling System
        </p>

      </div>

      <a
        href="/auth/google"
        class="google-btn"
      >
        Login With Google
      </a>

      <form
        action="/book-room"
        method="GET"
      >

        <div class="input-group">

          <label>
            Meeting Title
          </label>

          <input
            type="text"
            name="title"
            placeholder="Faculty Meeting"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Room
          </label>

          <select
            name="room"
            id="room"
          >

            <option value="SeminarHall">
              Seminar Hall
            </option>

            <option value="ConferenceRoom">
              Conference Room
            </option>

            <option value="Lab101">
              Lab 101
            </option>

            <option value="MeetingRoomA">
              Meeting Room A
            </option>

          </select>

        </div>

        <div class="row">

          <div class="input-group">

            <label>
              Date
            </label>

            <input
              type="date"
              name="date"
              id="date"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Attendee Email
            </label>

            <input
              type="email"
              name="attendee"
              placeholder="example@gmail.com"
            >

          </div>

        </div>

        <div class="row">

          <div class="input-group">

            <label>
              Start Time
            </label>

            <input
              type="time"
              name="start"
              id="start"
              required
            >

          </div>

          <div class="input-group">

            <label>
              End Time
            </label>

            <input
              type="time"
              name="end"
              id="end"
              required
            >

          </div>

        </div>

        <div
          class="status"
          id="status"
        >

        </div>

        <div class="buttons">

          <button
            type="button"
            class="check-btn"
            onclick="checkAvailability()"
          >
            Check Availability
          </button>

          <button
            type="submit"
            class="book-btn"
          >
            Book Room
          </button>

        </div>

      </form>

      <div class="footer">

        <a href="/bookings">
          View All Bookings
        </a>

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="calendar-box">

      <div id="calendar"></div>

    </div>

  </div>

  <!-- Full Calendar JS -->

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <script>

    // ==========================
    // CHECK AVAILABILITY
    // ==========================

    async function checkAvailability() {

      const room =
        document.getElementById("room").value;

      const date =
        document.getElementById("date").value;

      const start =
        document.getElementById("start").value;

      const end =
        document.getElementById("end").value;

      const response = await fetch(

        `/check-availability?room=${room}&date=${date}&start=${start}&end=${end}`

      );

      const result =
        await response.text();

      const status =
        document.getElementById("status");

      status.innerHTML =
        `Room Status: ${result}`;

      if (result === "Busy") {

        status.style.color = "red";

      } else {

        status.style.color = "green";

      }

    }

    // ==========================
    // FULL CALENDAR
    // ==========================

    document.addEventListener(

      "DOMContentLoaded",

      function () {

        const calendarEl =
          document.getElementById("calendar");

        const calendar =
          new FullCalendar.Calendar(

            calendarEl,

            {

              initialView: "dayGridMonth",

              height: 700,

              selectable: true,

              dateClick: function(info) {

                document.getElementById("date").value =
                  info.dateStr;

              }

            }

          );

        calendar.render();

      }

    );

  </script>

</body>

</html>
